<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML | Aula 03</title>
    <style>
        .my-text {
            color: white
        }
        #header {
            background-color: red;
            height: 130px;
            text-align: center;
        }
        #main {
            background-color: #ff00f2;
            height: 350px;
        }
        #aside {
            background-color: #005eff;
            height: 100%;
            width: 30%;
            float: left;
        }
        #content {
            background-color: #26ff00;
            height: 100%;
            width: 60%;
            float: right;
        }
        #footer {
            background-color: grey;
            height: 30px;
        }
    </style>
</head>
<body>
    <div id="header"> <!-- div = divisão de contéudo -->
        <h1>Contéudo do cabeçalho</h1>
    </div>
    <div id="main">
        <div id="aside" >
            <h2 class="my-text">Contéudo barra lateral</h2>
        </div>

        <div id="content">
            <h2 class="my-text">Countéudo principal</h2>
        </div>
    </div>
    <div id="footer">
        <h2 class="my-text" >Contéudo do rodapé</h2>
    </div>
</body>
</html>
