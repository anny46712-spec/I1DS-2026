<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>HTML Intermediário</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <!--<div id="header">...</div>--> 

    <header> <!-- tag semântica do cabeçalho -->
        Área do cabeçalho

    <nav> <!-- tag semântica para menu de navegação -->

            Área lateral

        <section>
            Seção de conteúdos
        </section>
    </main>

    <footer>
        Área do rodapé do site
    </footer>
